{% extends "base.html" %}

{% block content %}
<body>
<div class="reg-form">
    <h2>Регистрация</h2>
    <form action="#" method="post">
        <div class="field">
            <label for="name">Имя:</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="field">
            <label for="surname">Фамилия:</label>
            <input type="text" id="surname" name="surname" required>
        </div>
        <div class="field">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="field">
            <label for="phone">Номер телефона:</label>
            <input type="tel" id="phone" name="phone" placeholder="+7 (999) 000-00-00">
        </div>
        <div class="field">
            <label for="age">Возраст:</label>
            <input type="number" id="age" name="age" min="1" max="120">
        </div>
        <div class="field">
            <label>Пол:</label>
            <div class="gender-group">
                <input type="radio" id="male" name="gender" value="male"> <label for="male">Мужской</label>
                <input type="radio" id="female" name="gender" value="female"> <label for="female">Женский</label>
                <input type="radio" id="other" name="gender" value="other"> <label for="other">Другой</label>
            </div>
        </div>
        <div class="field">
            <label for="address">Адрес:</label>
            <input type="text" id="address" name="address">
        </div>
        <div class="field">
            <label for="about">О себе:</label>
            <textarea id="about" name="about" rows="3"></textarea>
        </div>
        <div class="field">
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Зарегистрироваться</button>
    </form>
</div>
</body>
{% endblock %}
