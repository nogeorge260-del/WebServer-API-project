{% extends "base.html" %}

{% block content %}
<body>
<h1>Регистрация</h1>
<div>
    <form class="login_form" method="post">
        <input type="last-name" class="form-control" id="last-name" placeholder="Введите фамилию*" name="last-name" required>
        <input type="name" class="form-control" id="name" placeholder="Введите имя*" name="name" required>
        <br>
        <input type="age" class="form-control" id="age" placeholder="Введите возраст*" name="age" required>
        <br>
        <div class="form-group">
            <label for="classSelect">Укажите свой пол</label>
            <select class="form-control" id="classSelect" name="class" required>
                <option>Мужской</option>
                <option>Женский</option>
                <option>Другой</option>
            </select>
            <br>
        </div>
        <input type="email" class="form-control" id="email" aria-describedby="emailHelp" placeholder="Введите адрес электронной почты*" name="email" required>
        <input type="phone_number" class="form-control" id="phone_number" placeholder="Введите номер телефона" name="phone_number">
        <br>
        <div class="form-group">
            <label for="about">Расскажите немного о себе</label>
            <textarea class="form-control" id="about" placeholder="..." rows="3" name="about"></textarea>
        </div>
        <br>
        <div class="form-group">
            <label for="photo">Приложите свою фотографию</label>
            <input type="file" class="form-control-file" id="photo" name="file">
        </div>
        <br>
        <button type="submit" class="btn btn-primary">Отправить</button>
    </form>
</div>
</body>
{% endblock %}
