<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background-image: url(https://images.unsplash.com/photo-1519608487953-e999c86e7455?auto=format&fit=crop&w=1600&q=80);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-box {
      width: 620px;
      padding: 25px;
      background: rgba(240, 240, 240, 0.85);
      border-radius: 60px;
      text-align: center;
    }

    h1 {
      display: inline-block;
      margin: -10px 0 20px;
      padding: 8px 25px;
      color: white;
      background: black;
      border-radius: 7px;
      font-size: 32px;
    }

    .row {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 10px;
    }

    input,
    select,
    textarea {
      padding: 10px;
      font-size: 17px;
      border: none;
      border-radius: 7px;
      box-sizing: border-box;
    }

    input {
      width: 295px;
      text-align: center;
    }

    .small-input {
      width: 270px;
      margin-bottom: 10px;
    }

    .wide-input {
      width: 455px;
      margin-bottom: 10px;
    }

    .gender {
      text-align: left;
      margin: 0 auto 10px;
      width: 455px;
      font-size: 20px;
    }

    .gender label {
      font-weight: bold;
    }

    .about {
      width: 600px;
      background: white;
      border-radius: 20px;
      padding: 0 10px 10px;
      margin: 0 auto 10px;
      box-sizing: border-box;
    }

    .about label {
      display: block;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 5px;
    }

    textarea {
      width: 100%;
      height: 80px;
      resize: none;
      border: 1px solid gray;
      border-radius: 0;
      text-align: left;
    }

    .photo {
      width: 600px;
      background: white;
      border-radius: 15px;
      padding: 15px;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 24px;
      text-align: left;
      box-sizing: border-box;
    }

    .photo label {
      width: 150px;
    }

    #photo {
      display: none;
    }

    .file-btn {
      width: auto !important;
      border: 2px solid gray;
      padding: 5px 15px;
      background: #eeeeee;
      cursor: pointer;
      font-size: 24px;
    }

    .file-text {
      font-size: 24px;
      white-space: nowrap;
    }

    button {
      padding: 12px 35px;
      font-size: 28px;
      font-weight: bold;
      background: #b7d6f0;
      border: 1px solid #333;
      border-radius: 9px;
      cursor: pointer;
    }

    button:hover {
      background: #9fc5e8;
    }
  </style>
</head>

<body>
  <div class="form-box">
    <h1>Регистрация</h1>

    <form action="#" method="post" enctype="multipart/form-data">
      <div class="row">
        <input type="text" id="name" name="name" placeholder="Введите имя" required>
        <input type="text" id="last-name" name="last-name" placeholder="Введите фамилию" required>
      </div>

      <input class="small-input" type="number" id="age" name="age" min="1" max="120" placeholder="Введите возраст" required>

      <div class="gender">
        <label for="gender">Укажите свой пол</label>
        <select id="gender" name="gender" required>
          <option value="male">Мужской</option>
          <option value="female">Женский</option>
          <option value="other">Другой</option>
        </select>
      </div>

      <input class="wide-input" type="email" id="email" name="email" placeholder="Введите электронную почту" required>

      <input class="wide-input" type="tel" id="phone" name="phone" placeholder="Введите номер телефона">

      <div class="about">
        <label for="about">Расскажи немного о себе:</label>
        <textarea id="about" name="about" placeholder="..."></textarea>
      </div>

      <div class="photo">
        <label>Приложи свое фото:</label>

        <label for="photo" class="file-btn">Выберите файл</label>
        <span class="file-text">Файл не выбран</span>

        <input type="file" id="photo" name="photo" accept="image/*">
      </div>

      <button type="submit">Отправить!</button>
    </form>
  </div>
</body>
</html>
